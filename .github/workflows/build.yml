name: Fast Build v2rayNG Fork
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew
        working-directory: ./V2rayNG

      - name: Fetch Precompiled Core (libv2ray.aar)
        run: |
          mkdir -p V2rayNG/app/libs
          curl -L -o V2rayNG/app/libs/libv2ray.aar https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar

      - name: Build Fast Signed APK
        # Собираем Debug-версию: она автоматически подпишется ключом и без проблем встанет на телефон
        run: ./gradlew assemblePlaystoreDebug -x test -x lint
        working-directory: ./V2rayNG
        
      - name: Isolate Compiled APKs
        run: |
          mkdir -p ready-apks
          echo "=== ИЩЕМ ГОТОВЫЙ ПОДПИСАННЫЙ APK ==="
          find V2rayNG/app/build -name "*.apk" -type f
          echo "=== КОПИРУЕМ ==="
          find V2rayNG/app/build -name "*.apk" -type f -exec cp -v {} ready-apks/ \;
          echo "=== ПРОВЕРКА ==="
          ls -la ready-apks/
          if [ -z "$(ls -A ready-apks/)" ]; then
            echo "❌ ОШИБКА: APK не найдены!"
            exit 1
          fi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-fast-debug
          path: ready-apks/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v2rayNG Auto-Build #${{ github.run_number }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ready-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
